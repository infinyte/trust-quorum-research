<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trust Quorum Simulation v3 — DMX Edition</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--surface:#161920;--surface2:#1e2330;--surface3:#252b3b;
  --border:#2a3050;--border2:#3a4268;
  --text:#c8d0e8;--text2:#7a8ab0;--text3:#4a5880;
  --green:#4ade80;--green2:#166534;--green3:#052e16;
  --red:#f87171;--red2:#7f1d1d;--red3:#3f0f0f;
  --amber:#fbbf24;--amber2:#78350f;
  --blue:#60a5fa;--blue2:#1e3a5f;
  --purple:#a78bfa;--purple2:#3b1f6e;
  --cyan:#22d3ee;--cyan2:#0e4f5a;
  --orange:#fb923c;--orange2:#7c2d12;
  --font-mono:'JetBrains Mono',monospace;
  --font-display:'Syne',sans-serif;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--font-mono);font-size:13px;line-height:1.5;min-height:100vh}
body{padding:20px;max-width:960px;margin:0 auto}
h1{font-family:var(--font-display);font-size:18px;font-weight:800;color:#e2e8f8;letter-spacing:-0.5px;margin-bottom:2px}
.subtitle{color:var(--text3);font-size:10px;margin-bottom:14px}
.top-bar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.controls{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
button{background:var(--surface2);border:0.5px solid var(--border2);color:var(--text);font-family:var(--font-mono);font-size:11px;padding:5px 12px;border-radius:6px;cursor:pointer;transition:all .15s}
button:hover{background:var(--surface3)}
button.primary{background:var(--blue2);border-color:var(--blue);color:var(--blue)}
button.danger{background:var(--red3);border-color:var(--red);color:var(--red)}
.speed-wrap{display:flex;align-items:center;gap:5px;color:var(--text2);font-size:10px}
input[type=range]{width:70px;accent-color:var(--blue)}
.tab-row{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.tab{padding:4px 11px;border-radius:6px;font-size:10px;cursor:pointer;color:var(--text2);background:var(--surface2);border:0.5px solid var(--border);transition:all .15s}
.tab.active{background:var(--blue2);color:var(--blue);border-color:var(--blue)}
.hidden{display:none}
.hud{display:grid;grid-template-columns:56px 1fr;gap:10px;align-items:start;margin-bottom:12px}
.round-box{text-align:center;padding:8px 4px;background:var(--surface2);border-radius:8px;border:0.5px solid var(--border)}
.round-num{font-size:26px;font-weight:800;color:#e2e8f8;font-family:var(--font-display);line-height:1}
.round-lbl{font-size:9px;color:var(--text3);margin-top:1px}
.threat-bar{display:flex;align-items:center;gap:6px;padding:7px 11px;border-radius:8px;border:0.5px solid var(--border);background:var(--surface2);margin-bottom:8px}
.threat-lbl{font-size:9px;font-weight:700;color:var(--text3);letter-spacing:1px;min-width:46px}
.threat-pips{display:flex;gap:2px;flex:1}
.pip{flex:1;height:7px;border-radius:2px;background:var(--surface3);transition:background .3s}
.pip.g{background:var(--green)}.pip.y{background:var(--amber)}.pip.r{background:var(--red)}
.threat-val{font-size:10px;font-weight:700;min-width:52px;text-align:right}
.probe-alert{background:#001a1f;border:0.5px solid var(--cyan);border-radius:7px;padding:8px 12px;font-size:10px;color:var(--cyan);display:flex;align-items:center;gap:7px}
.probe-dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);animation:blink 1s infinite;flex-shrink:0}
.trigger-alert{background:#1a0a00;border:0.5px solid var(--orange);border-radius:7px;padding:8px 12px;font-size:10px;color:var(--orange);display:flex;align-items:center;gap:7px;margin-top:6px}
.trigger-dot{width:7px;height:7px;border-radius:50%;background:var(--orange);animation:blink .6s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.agent-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(max-width:640px){.agent-grid{grid-template-columns:repeat(2,1fr)}}
.agent-card{background:var(--surface2);border:0.5px solid var(--border);border-radius:9px;padding:10px;transition:border-color .2s;cursor:pointer;position:relative}
.agent-card:hover{border-color:var(--border2)}
.agent-card.flagged{border-color:var(--amber);background:#1a1600}
.agent-card.quarantined{border-color:var(--red);background:var(--red3);opacity:.7}
.agent-card.probing{border-color:var(--cyan);background:#001a1f}
.agent-card.triggered{border-color:var(--orange);background:#140800}
.agent-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.agent-name{font-weight:700;font-size:11px;color:#e2e8f8;font-family:var(--font-display)}
.agent-type{font-size:8px;padding:2px 5px;border-radius:4px;font-weight:600;letter-spacing:.4px}
.t-honest{background:#052e16;color:var(--green);border:0.5px solid var(--green2)}
.t-deceptive{background:var(--red3);color:var(--red);border:0.5px solid var(--red2)}
.t-longcon{background:var(--amber2);color:var(--amber);border:0.5px solid #92400e}
.t-misaligned{background:var(--cyan2);color:var(--cyan);border:0.5px solid #0e7490}
.t-strategic{background:var(--orange2);color:var(--orange);border:0.5px solid #9a3412}
.trust-wrap{margin:5px 0 4px}
.trust-lbl{display:flex;justify-content:space-between;font-size:9px;color:var(--text2);margin-bottom:2px}
.trust-bg{height:4px;background:var(--surface3);border-radius:2px;overflow:hidden}
.trust-fill{height:100%;border-radius:2px;transition:width .4
